<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/print.css' | prepend: site.baseurl }}">
    <script>
      window.isPrintMode = true;
      window.isAnswerKey = {{ page.is_answer_key | default: false }};
    </script>
    <script src="{{ '/assets/js/crossword.js' | prepend: site.baseurl }}"></script>
</head>
<body>
    <div class="no-print" style="text-align: center; margin: 20px;">
        <button class="btn-print" onclick="window.print()">🖨️ 인쇄하기 (또는 PDF 저장)</button>
        <button class="btn-print" style="background:#6c757d; margin-left:10px;" onclick="history.back()">뒤로 가기</button>
    </div>
    
    <div class="a4-page">
        {{ content }}
    </div>
</body>
</html>
